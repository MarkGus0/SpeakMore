<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Detected</title>
  <style>
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: "Inter", "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      user-select: none;
    }

    .shell {
      width: 584px;
      min-height: 116px;
      margin: 8px 18px 8px 18px;
      display: grid;
      grid-template-columns: 6px 64px minmax(0, 1fr) auto 28px;
      align-items: center;
      gap: 16px;
      padding: 20px 16px 20px 10px;
      color: #f8fafc;
      background: #181818;
      border-radius: 18px;
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.32);
    }

    .accent {
      width: 5px;
      height: 58px;
      border-radius: 999px;
      background: #43d676;
    }

    .icon {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
    }

    .bars {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 28px;
    }

    .bars span {
      display: block;
      width: 3px;
      border-radius: 999px;
      background: #181818;
    }

    .bars span:nth-child(1) { height: 12px; }
    .bars span:nth-child(2) { height: 22px; }
    .bars span:nth-child(3) { height: 16px; }
    .bars span:nth-child(4) { height: 28px; }
    .bars span:nth-child(5) { height: 18px; }

    .copy {
      min-width: 0;
    }

    .title {
      margin: 0 0 5px;
      font-size: 22px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: 0;
      color: #f5f5f5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .app {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
      color: #9b9b9b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .start {
      border: 0;
      border-radius: 12px;
      min-width: 194px;
      height: 68px;
      padding: 9px 18px;
      color: #f7f7f7;
      background: #3b3b3d;
      cursor: pointer;
      text-align: left;
      font: inherit;
    }

    .start strong {
      display: block;
      font-size: 19px;
      line-height: 1.15;
      font-weight: 800;
    }

    .start span {
      display: block;
      margin-top: 4px;
      font-size: 16px;
      line-height: 1.1;
      color: #b9b9b9;
    }

    .start:hover { background: #4a4a4d; }

    .close {
      align-self: start;
      width: 28px;
      height: 28px;
      border: 0;
      padding: 0;
      margin-top: -8px;
      color: #9b9b9b;
      background: transparent;
      cursor: pointer;
      font-size: 30px;
      line-height: 28px;
    }

    .close:hover { color: #f3f4f6; }
  </style>
</head>
<body>
  <div class="shell" id="card">
    <div class="accent"></div>
    <div class="icon" aria-hidden="true">
      <div class="bars">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
    <div class="copy">
      <p class="title">Meeting Detected</p>
      <p class="app" id="app-name">SpeakMore</p>
    </div>
    <button class="start" id="start-button" type="button">
      <strong>Start Recording</strong>
      <span>&amp; open SpeakMore</span>
    </button>
    <button class="close" id="close-button" type="button" aria-label="Close">×</button>
  </div>

  <script>
    let currentPayload = {};

    function update(payload) {
      currentPayload = payload || {};
      const appName = String(currentPayload.appName || currentPayload.appIdentifier || 'Meeting').trim();
      document.getElementById('app-name').textContent = appName || 'Meeting';
      document.body.style.display = currentPayload.visible === false ? 'none' : 'block';
    }

    async function startRecording() {
      if (window.ipcRenderer && typeof window.ipcRenderer.invoke === 'function') {
        await window.ipcRenderer.invoke('meeting-detector:start-recording', currentPayload);
      }
    }

    async function dismiss() {
      if (window.ipcRenderer && typeof window.ipcRenderer.invoke === 'function') {
        await window.ipcRenderer.invoke('meeting-detector:dismiss', currentPayload);
      }
    }

    document.getElementById('start-button').addEventListener('click', () => {
      void startRecording();
    });
    document.getElementById('close-button').addEventListener('click', () => {
      void dismiss();
    });

    if (window.ipcRenderer) {
      window.ipcRenderer.on('meeting-detector:detected', (_event, payload) => update(payload || {}));
    }
  </script>
</body>
</html>
