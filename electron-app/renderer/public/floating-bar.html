<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
  pointer-events: none;
}
#scene {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
#voice-visual {
  width: 220px;
  min-height: 224px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#hint-text {
  min-height: 18px;
  margin-bottom: 10px;
  color: rgba(255, 255, 255, 0.42);
  font-size: 12px;
  letter-spacing: 0;
  text-align: center;
  text-shadow: 0 0 18px rgba(255, 255, 255, 0.16);
  transition: color 180ms ease, opacity 180ms ease, text-shadow 180ms ease;
}
#particle-sphere-container {
  position: relative;
  width: 120px;
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#particle-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
body[data-tone="recording"] #hint-text {
  color: rgba(125, 211, 252, 0.9);
  text-shadow: 0 0 18px rgba(56, 189, 248, 0.35);
}
body[data-tone="processing"] #hint-text,
body[data-tone="completed"] #hint-text {
  color: rgba(74, 222, 128, 0.92);
  text-shadow: 0 0 18px rgba(16, 185, 129, 0.36);
}
body[data-tone="cancelled"] #hint-text,
body[data-tone="error"] #hint-text {
  color: rgba(248, 113, 113, 0.9);
  text-shadow: 0 0 18px rgba(248, 113, 113, 0.28);
}
body[data-tone="idle"] #hint-text {
  opacity: 0.72;
}
</style>
</head>
<body data-tone="idle">
<div id="scene">
  <div id="voice-visual">
    <p id="hint-text">Right Alt 录音</p>
    <div id="particle-sphere-container" data-state="idle">
      <canvas id="particle-canvas"></canvas>
    </div>
  </div>
</div>
<script src="./lib/three.min.js"></script>
<script>
const IDLE_TEXT = 'Right Alt 录音';
const LONG_PROCESSING_TEXT = '正在努力处理中...';
const LONG_PROCESSING_DELAY_MS = 3000;
const hintText = document.getElementById('hint-text');
const particleContainer = document.getElementById('particle-sphere-container');
const particleCanvas = document.getElementById('particle-canvas');

let voiceState = null;
let particleSphere = null;
let processingHintTimer = null;
let longProcessingHintVisible = false;
let processingHintToken = 0;

function clampLevel(value) {
  if (typeof value !== 'number' || Number.isNaN(value)) return 0;
  return Math.max(0, Math.min(1, value));
}

function setHintText(value) {
  hintText.textContent = value || IDLE_TEXT;
}

function setVisualTone(tone) {
  document.body.dataset.tone = tone;
  particleContainer.dataset.state = tone;
}

function getRecordingText(mode) {
  if (mode === 'Ask') return '请随意提出问题';
  if (mode === 'Translate') return '正在听取翻译内容...';
  return '正在听写...';
}

function getProcessingText(mode) {
  if (mode === 'Ask') return '正在处理...';
  if (mode === 'Translate') return '正在翻译...';
  return '正在转写...';
}

function isProcessingStatus(status) {
  return status === 'stopping' || status === 'transcribing';
}

function clearProcessingHintTimer() {
  if (!processingHintTimer) return;
  window.clearTimeout(processingHintTimer);
  processingHintTimer = null;
}

function resetProcessingHint() {
  clearProcessingHintTimer();
  longProcessingHintVisible = false;
  processingHintToken += 1;
}

function scheduleProcessingHint(status) {
  if (!isProcessingStatus(status)) {
    resetProcessingHint();
    return;
  }

  if (processingHintTimer || longProcessingHintVisible) return;

  const token = processingHintToken + 1;
  processingHintToken = token;
  processingHintTimer = window.setTimeout(() => {
    processingHintTimer = null;
    const currentStatus = voiceState && typeof voiceState.status === 'string' ? voiceState.status : 'idle';

    if (processingHintToken !== token || !isProcessingStatus(currentStatus)) return;

    longProcessingHintVisible = true;
    render();
  }, LONG_PROCESSING_DELAY_MS);
}

class ParticleSphere {
  constructor(canvas) {
    this.canvas = canvas;
    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
    this.renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    this.particleCount = 800;
    this.state = 'idle';
    this.targetRadius = 1.5;
    this.currentRadius = 1.5;
    this.targetOpacity = 0.78;
    this.currentOpacity = 0.78;
    this.audioLevel = 0;
    this.basePositions = [];
    this.statusTimer = null;
    this.frameId = null;

    this.init();
    this.animate();
  }

  init() {
    this.camera.position.z = 4;
    this.renderer.setPixelRatio(window.devicePixelRatio || 1);
    this.resize();

    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(this.particleCount * 3);
    const colors = new Float32Array(this.particleCount * 3);

    for (let i = 0; i < this.particleCount; i += 1) {
      const phi = Math.acos(-1 + (2 * i) / this.particleCount);
      const theta = Math.sqrt(this.particleCount * Math.PI) * phi;
      const radius = 1.5 + (Math.random() - 0.5) * 0.3;
      const x = radius * Math.cos(theta) * Math.sin(phi);
      const y = radius * Math.sin(theta) * Math.sin(phi);
      const z = radius * Math.cos(phi);

      positions[i * 3] = x;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = z;
      this.basePositions.push({ x, y, z });

      colors[i * 3] = 1;
      colors[i * 3 + 1] = 1;
      colors[i * 3 + 2] = 1;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.04,
      vertexColors: true,
      transparent: true,
      opacity: this.currentOpacity,
      sizeAttenuation: true,
    });

    this.particles = new THREE.Points(geometry, material);
    this.scene.add(this.particles);
  }

  resize() {
    const width = this.canvas.clientWidth || 120;
    const height = this.canvas.clientHeight || 120;
    this.renderer.setSize(width, height, false);
    this.camera.aspect = width / height;
    this.camera.updateProjectionMatrix();
  }

  setState(nextState) {
    if (this.state === nextState) return;
    window.clearTimeout(this.statusTimer);
    this.statusTimer = null;
    this.state = nextState;

    if (nextState === 'recording') {
      this.targetRadius = 1.02;
      this.targetOpacity = 0.9;
      return;
    }

    if (nextState === 'processing') {
      this.targetRadius = 2.35;
      this.targetOpacity = 0.88;
      return;
    }

    if (nextState === 'cancelled' || nextState === 'error') {
      this.targetRadius = 0.34;
      this.targetOpacity = 0.52;
      this.statusTimer = window.setTimeout(() => this.setState('idle'), 900);
      return;
    }

    if (nextState === 'completed') {
      this.targetRadius = 2.05;
      this.targetOpacity = 0.84;
      this.statusTimer = window.setTimeout(() => this.setState('idle'), 900);
      return;
    }

    this.targetRadius = 1.5;
    this.targetOpacity = 0.78;
    this.audioLevel = 0;
  }

  setRecording(isRecording) {
    if (isRecording) {
      this.setState('recording');
      return;
    }
    if (this.state === 'recording') this.setState('idle');
  }

  setProcessing(isProcessing) {
    if (isProcessing) {
      this.setState('processing');
      return;
    }
    if (this.state === 'processing') this.setState('idle');
  }

  setInputLevel(inputLevel) {
    this.audioLevel = clampLevel(inputLevel);
  }

  cancel() {
    this.setState('cancelled');
  }

  complete() {
    this.setState('completed');
  }

  fail() {
    this.setState('error');
  }

  animate() {
    this.frameId = window.requestAnimationFrame(() => this.animate());
    if (!this.particles) return;

    const positions = this.particles.geometry.attributes.position.array;
    const colors = this.particles.geometry.attributes.color.array;
    const time = performance.now() * 0.001;

    this.currentRadius += (this.targetRadius - this.currentRadius) * 0.08;
    this.currentOpacity += (this.targetOpacity - this.currentOpacity) * 0.05;
    this.particles.material.opacity = this.currentOpacity;

    for (let i = 0; i < this.particleCount; i += 1) {
      const base = this.basePositions[i];
      const scale = this.currentRadius / 1.5;
      let noise = 0;

      if (this.state === 'recording') {
        const responsiveLevel = Math.sqrt(this.audioLevel);
        const recordingPulse = 0.08 + responsiveLevel * 1.15;
        noise = Math.sin(time * 3 + i * 0.1) * recordingPulse;
      } else if (this.state === 'processing') {
        noise = Math.sin(time * 5 + i * 0.2) * 0.3;
      } else if (this.state === 'completed') {
        noise = Math.sin(time * 4 + i * 0.08) * 0.16;
      }

      positions[i * 3] = base.x * scale + noise * Math.sin(i);
      positions[i * 3 + 1] = base.y * scale + noise * Math.cos(i);
      positions[i * 3 + 2] = base.z * scale;

      if (this.state === 'recording') {
        colors[i * 3] = 0.4 + Math.sin(time * 2 + i * 0.05) * 0.24;
        colors[i * 3 + 1] = 0.78 + Math.sin(time * 2 + i * 0.05) * 0.18;
        colors[i * 3 + 2] = 1;
      } else if (this.state === 'processing') {
        colors[i * 3] = 0.18 + Math.sin(time * 3 + i * 0.04) * 0.08;
        colors[i * 3 + 1] = 0.95;
        colors[i * 3 + 2] = 0.48 + Math.sin(time * 3 + i * 0.04) * 0.12;
      } else if (this.state === 'cancelled') {
        colors[i * 3] = 0.42;
        colors[i * 3 + 1] = 0.42;
        colors[i * 3 + 2] = 0.42;
      } else if (this.state === 'error') {
        colors[i * 3] = 1;
        colors[i * 3 + 1] = 0.28;
        colors[i * 3 + 2] = 0.28;
      } else if (this.state === 'completed') {
        colors[i * 3] = 0.52;
        colors[i * 3 + 1] = 1;
        colors[i * 3 + 2] = 0.74;
      } else {
        colors[i * 3] += (1 - colors[i * 3]) * 0.05;
        colors[i * 3 + 1] += (1 - colors[i * 3 + 1]) * 0.05;
        colors[i * 3 + 2] += (1 - colors[i * 3 + 2]) * 0.05;
      }
    }

    this.particles.geometry.attributes.position.needsUpdate = true;
    this.particles.geometry.attributes.color.needsUpdate = true;

    const rotationSpeed = this.state === 'processing' ? 0.004 : 0.003;
    this.particles.rotation.y += rotationSpeed;
    this.particles.rotation.x += rotationSpeed * 0.3;
    this.renderer.render(this.scene, this.camera);
  }
}

function renderFallback() {
  particleContainer.style.display = 'none';
}

function initializeParticleSphere() {
  if (!window.THREE) {
    renderFallback();
    return;
  }

  particleSphere = new ParticleSphere(particleCanvas);
  window.addEventListener('resize', () => particleSphere?.resize());
}

function renderVoiceState(state) {
  const status = state && typeof state.status === 'string' ? state.status : 'idle';
  const mode = state && typeof state.mode === 'string' ? state.mode : 'Dictate';
  const displayText = state && typeof state.displayText === 'string' ? state.displayText : '';
  const errorMessage = state && typeof state.errorMessage === 'string' ? state.errorMessage : '';
  const stateLevel = state && typeof state.inputLevel === 'number' ? state.inputLevel : 0;
  scheduleProcessingHint(status);

  if (particleSphere) {
    particleSphere.setInputLevel(stateLevel);
    particleSphere.setRecording(status === 'recording');
    particleSphere.setProcessing(status === 'stopping' || status === 'transcribing');
  }

  if (status === 'recording') setVisualTone('recording');
  else if (status === 'stopping' || status === 'transcribing') setVisualTone('processing');
  else if (status === 'completed') setVisualTone('completed');
  else if (status === 'cancelled') setVisualTone('cancelled');
  else if (status === 'error') setVisualTone('error');
  else setVisualTone('idle');

  if (status === 'cancelled') {
    if (particleSphere) particleSphere.cancel();
  } else if (status === 'completed') {
    if (particleSphere) particleSphere.complete();
  } else if (status === 'error') {
    if (particleSphere) particleSphere.fail();
  }

  if (displayText) {
    setHintText(displayText);
    return;
  }

  if (status === 'recording') {
    setHintText(getRecordingText(mode));
    return;
  }

  if (status === 'connecting') setHintText('正在连接...');
  else if (isProcessingStatus(status)) {
    setHintText(longProcessingHintVisible ? LONG_PROCESSING_TEXT : getProcessingText(mode));
  }
  else if (status === 'cancelled') {
    setHintText('当前转录已取消');
  } else if (status === 'completed') {
    setHintText('已完成');
  } else if (status === 'error') {
    setHintText(errorMessage || '发生错误');
  } else {
    setHintText(IDLE_TEXT);
  }
}

function render() {
  renderVoiceState(voiceState);
}

function applyVoiceState(state) {
  voiceState = state;
  render();
}

initializeParticleSphere();

if (window.ipcRenderer) {
  window.ipcRenderer.on('voice-state', (_event, state) => applyVoiceState(state));
}

render();
</script>
</body>
</html>
